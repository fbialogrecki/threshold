# https://taskfile.dev
version: '3'

# Taskfile = single source of truth (Konstytucja §17)
# Wszystkie powtarzalne komendy żyją tutaj i są używane lokalnie oraz w CI.

vars:
  WEB_DIR: apps/web
  SERVICES_DIR: services
  PROTO_DIR: libs/proto
  GENERATED_DIR: libs/generated
  IMAGE_REGISTRY: '{{default "threshold" .IMAGE_REGISTRY}}'
  IMAGE_TAG: '{{default "latest" .IMAGE_TAG}}'
  SERVICE: '{{default "web" .SERVICE}}'
  TASK_BIN: '{{default "go-task" .TASK_BIN}}'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - '{{.TASK_BIN}} --list'

  # ─── Tooling / repo status ────────────────────────────────────────────

  doctor:
    desc: Check required local tooling without changing the system
    cmds:
      - |
        set -e
        for tool in bun git; do
          command -v "$tool" >/dev/null || { echo "missing required tool: $tool"; exit 1; }
        done
        if command -v go-task >/dev/null; then
          go-task --version
        elif command -v task >/dev/null && task --version | grep -qi 'Task version'; then
          task --version
        else
          echo "missing required tool: go-task from taskfile.dev"
          echo "Fedora package: go-task (binary: /usr/bin/go-task)"
          exit 1
        fi
        for tool in buf uv docker kubectl tilt kustomize; do
          if command -v "$tool" >/dev/null; then
            echo "ok: $tool"
          else
            echo "optional missing: $tool"
          fi
        done

  status:
    desc: Show concise repo status
    cmds:
      - git status --short
      - '{{.TASK_BIN}} --list'

  # ─── Web (Next.js + Bun) ──────────────────────────────────────────────

  web:install:
    desc: Install web dependencies
    dir: '{{.WEB_DIR}}'
    cmds:
      - bun install

  web:dev:
    desc: Start Next.js dev server with Bun
    dir: '{{.WEB_DIR}}'
    cmds:
      - bun --bun next dev

  web:build:
    desc: Build web app for production
    dir: '{{.WEB_DIR}}'
    cmds:
      - bun run build

  web:start:
    desc: Start production web server
    dir: '{{.WEB_DIR}}'
    cmds:
      - bun run start

  web:lint:
    desc: Run ESLint for web app
    dir: '{{.WEB_DIR}}'
    cmds:
      - bun run lint

  web:test:
    desc: Run Bun tests for web app if test files exist
    dir: '{{.WEB_DIR}}'
    cmds:
      - |
        if find . \
          -path './node_modules' -prune -o \
          -path './.next' -prune -o \
          -type f \( -name '*.test.ts' -o -name '*.test.tsx' -o -name '*.spec.ts' -o -name '*.spec.tsx' \) \
          -print | grep -q .; then
          bun test
        else
          echo "No web tests yet; skipping."
        fi

  web:typecheck:
    desc: Type-check web app
    dir: '{{.WEB_DIR}}'
    cmds:
      - bunx tsc --noEmit

  # ─── Python / services (future-proof, no-op until pyproject exists) ────

  py:lint:
    desc: Run Ruff if Python workspace exists
    cmds:
      - |
        if [ -f pyproject.toml ]; then
          uv run ruff check .
        else
          echo "No root pyproject.toml yet; skipping Python lint."
        fi

  py:format:
    desc: Format Python if Python workspace exists
    cmds:
      - |
        if [ -f pyproject.toml ]; then
          uv run ruff format .
        else
          echo "No root pyproject.toml yet; skipping Python format."
        fi

  py:typecheck:
    desc: Run mypy if Python workspace exists
    cmds:
      - |
        if [ -f pyproject.toml ]; then
          uv run mypy .
        else
          echo "No root pyproject.toml yet; skipping Python typecheck."
        fi

  py:test:
    desc: Run pytest if Python workspace exists
    cmds:
      - |
        if [ -f pyproject.toml ]; then
          uv run pytest
        else
          echo "No root pyproject.toml yet; skipping Python tests."
        fi

  service:dev:
    desc: Run a service locally, e.g. task service:dev SERVICE=auth-gateway
    dir: '{{.SERVICES_DIR}}/{{.SERVICE}}'
    cmds:
      - |
        pkg=$(printf '%s' '{{.SERVICE}}' | tr '-' '_')
        uv run fastapi dev src/$pkg/main.py

  service:test:
    desc: Run tests for one service, e.g. task service:test SERVICE=users
    dir: '{{.SERVICES_DIR}}/{{.SERVICE}}'
    cmds:
      - uv run pytest

  service:lint:
    desc: Run lint for one service, e.g. task service:lint SERVICE=events
    dir: '{{.SERVICES_DIR}}/{{.SERVICE}}'
    cmds:
      - uv run ruff check .

  # ─── Protobuf / buf ───────────────────────────────────────────────────

  proto:lint:
    desc: Lint protobuf schemas
    dir: '{{.PROTO_DIR}}'
    cmds:
      - buf lint

  proto:generate:
    desc: Generate protobuf code into libs/generated
    dir: '{{.PROTO_DIR}}'
    cmds:
      - buf generate

  proto:breaking:
    desc: Check protobuf breaking changes against main branch
    dir: '{{.PROTO_DIR}}'
    cmds:
      - buf breaking --against ../../.git#branch=main

  proto:check:
    desc: Lint and generate protobuf code
    cmds:
      - task: proto:lint
      - task: proto:generate

  # ─── Global gates ─────────────────────────────────────────────────────

  install:
    desc: Install all local dependencies
    cmds:
      - task: web:install

  lint:
    desc: Run all linters that are available now
    cmds:
      - task: web:lint
      - task: py:lint
      - task: proto:lint

  typecheck:
    desc: Run all type checks
    cmds:
      - task: web:typecheck
      - task: py:typecheck

  test:
    desc: Run all tests
    cmds:
      - task: web:test
      - task: py:test

  build:
    desc: Build all buildable apps
    cmds:
      - task: web:build

  check:
    desc: Main local quality gate
    cmds:
      - task: lint
      - task: typecheck
      - task: test
      - task: build

  dev:
    desc: Start main local dev loop
    cmds:
      - task: web:dev

  # ─── Docker / registry ────────────────────────────────────────────────

  docker:build:web:
    desc: Build Docker image for web
    dir: '{{.WEB_DIR}}'
    cmds:
      - docker build -t {{.IMAGE_REGISTRY}}/web:{{.IMAGE_TAG}} .

  docker:push:web:
    desc: Push Docker image for web
    cmds:
      - docker push {{.IMAGE_REGISTRY}}/web:{{.IMAGE_TAG}}

  docker:build:service:
    desc: Build Docker image for SERVICE, e.g. task docker:build:service SERVICE=users IMAGE_TAG=dev
    cmds:
      - docker build -f {{.SERVICES_DIR}}/{{.SERVICE}}/Dockerfile -t {{.IMAGE_REGISTRY}}/{{.SERVICE}}:{{.IMAGE_TAG}} .

  docker:push:service:
    desc: Push Docker image for SERVICE
    cmds:
      - docker push {{.IMAGE_REGISTRY}}/{{.SERVICE}}:{{.IMAGE_TAG}}

  # ─── Repository safety ───────────────────────────────────────────────

  repo:secret-scan:
    desc: Lightweight repo scan for obvious committed secrets
    cmds:
      - |
        python3 - <<'PY'
        from pathlib import Path
        import re, sys

        skip_dirs = {'.git', 'node_modules', 'graphify-out', '.next', '.venv', '.mypy_cache', '.ruff_cache', '.pytest_cache', 'bun-dist', 'vendor'}
        private_key = re.compile(r'BEGIN (RSA|OPENSSH|EC|PRIVATE) KEY', re.I)
        # High-signal only: quoted or YAML-like literal credential values.
        # Avoid variable references such as payload.password or password_hash fields.
        literal_secret = re.compile(
            r'''(?ix)
            \b(password|client_secret|private_key|access_key|secret_access_key|api_token|auth_token)\b
            [A-Za-z0-9_ -]*
            (?:[:=]|:\s*)\s*
            ["']?([A-Za-z0-9_./+=-]{20,})["']?
            '''
        )
        known_non_secret = re.compile(
            r'''(?ix)
            \b(passwordKey|secretKey|remoteRef|secretRef|password_hash|new_password|payload\.password|check\.value\.password|.*\.password|payload\.token|token=payload|password=payload)\b
            |\b(supersecret|StrongPass123|test-internal-token)\b
            '''
        )
        hits = []
        for path in Path('.').rglob('*'):
            if not path.is_file():
                continue
            if any(part in skip_dirs for part in path.parts) or path.suffix in {'.lock'}:
                continue
            try:
                text = path.read_text(errors='ignore')
            except Exception:
                continue
            for i, line in enumerate(text.splitlines(), 1):
                if known_non_secret.search(line):
                    continue
                if private_key.search(line) or literal_secret.search(line):
                    hits.append(f'{path}:{i}:{line[:180]}')
        if hits:
            print('\n'.join(hits))
            print('Potential secret-like strings found. Review required.')
            sys.exit(1)
        PY

  # ─── CI aliases ───────────────────────────────────────────────────────

  ci:lint:
    desc: CI lint pipeline
    cmds:
      - task: lint

  ci:test:
    desc: CI test pipeline
    cmds:
      - task: test

  ci:build:
    desc: CI build pipeline
    cmds:
      - task: build

  ci:check:
    desc: Full CI quality gate
    cmds:
      - task: check
