when:
  - event: pull_request
    path:
      include:
        - apps/web/**
        - .woodpecker/web.yml
      on_empty: false
  - event: push
    branch: main
    path:
      include:
        - apps/web/**
        - .woodpecker/web.yml
      on_empty: false
  - event: manual

steps:
  web-check:
    image: docker.io/oven/bun:1-slim@sha256:d56a2534ffd262e92c12fd3249d3924d296d97086da773f821d7d0477435ea04
    commands:
      - cd apps/web
      - bun install --frozen-lockfile
      - bunx tsc --noEmit
      - bunx eslint
      - bun test
      - bun --bun next build

  validate-web-image:
    image: quay.io/buildah/stable@sha256:ca4edbaabf71ca330ec9b2714bf8e06c726a6e85ae215cfb1474d2e2c832aacb
    depends_on:
      - web-check
    environment:
      STORAGE_DRIVER: vfs
      BUILDAH_ISOLATION: chroot
    commands:
      - buildah bud --format=oci --storage-driver=vfs --isolation=chroot --tag threshold/web:ci --file apps/web/Dockerfile apps/web
      - buildah inspect --type image threshold/web:ci >/dev/null
    backend_options:
      kubernetes:
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: "2"
            memory: 3Gi
