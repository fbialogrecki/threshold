when:
  - event: pull_request
    path:
      include:
        - services/**
        - libs/py/**
        - pyproject.toml
        - uv.lock
        - .python-version
        - .woodpecker/python-quality.yml
      on_empty: false
  - event: push
    branch: main
    path:
      include:
        - services/**
        - libs/py/**
        - pyproject.toml
        - uv.lock
        - .python-version
        - .woodpecker/python-quality.yml
      on_empty: false
  - event: manual

steps:
  python-quality:
    image: ghcr.io/astral-sh/uv:python3.13-bookworm-slim@sha256:531f855bda2c73cd6ef67d56b733b357cea384185b3022bd09f05e002cd144ca
    commands:
      - uv lock --check
      - uv run ruff check .
      - uv run mypy .
      - uv run pytest
