name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - name: Install Gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
          GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl --fail --silent --show-error --location \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${archive}" \
            --output "/tmp/${archive}"
          echo "${GITLEAKS_SHA256}  /tmp/${archive}" | sha256sum --check --strict
          tar -xzf "/tmp/${archive}" -C /usr/local/bin gitleaks
      - run: gitleaks git --redact --verbose
      - name: Install Trivy
        env:
          TRIVY_VERSION: 0.72.0
          TRIVY_SHA256: bbb64b9695866ce4a7a8f5c9592002c5961cab378577fa3f8a040df362b9b2ea
        run: |
          archive="trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          curl --fail --silent --show-error --location \
            "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/${archive}" \
            --output "/tmp/${archive}"
          echo "${TRIVY_SHA256}  /tmp/${archive}" | sha256sum --check --strict
          tar -xzf "/tmp/${archive}" -C /usr/local/bin trivy
      - run: trivy fs --scanners vuln,misconfig --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 .
      - run: bash -n ci/woodpecker/*.sh
      - run: ci/woodpecker/woodpecker-build-push.sh --self-test
      - run: ci/woodpecker/woodpecker-promote-gitops.sh --self-test
      - run: python3 -m py_compile ci/woodpecker/bump-service-gitops.py

  containers:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth-gateway
            dockerfile: services/auth-gateway/Dockerfile
            context: .
          - service: events
            dockerfile: services/events/Dockerfile
            context: .
          - service: media
            dockerfile: services/media/Dockerfile
            context: .
          - service: social
            dockerfile: services/social/Dockerfile
            context: .
          - service: users
            dockerfile: services/users/Dockerfile
            context: .
          - service: web
            dockerfile: apps/web/Dockerfile
            context: apps/web
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Build ${{ matrix.service }} image
        run: docker build --file "${{ matrix.dockerfile }}" --tag "threshold/${{ matrix.service }}:ci" "${{ matrix.context }}"

  python:
    needs: [security, containers]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run mypy .
      - run: uv run pytest -q
      - run: uvx --from pip-audit==2.10.1 pip-audit --strict

  web:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/web
    env:
      AUTH_COOKIE_SECURE: "true"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun audit
      - run: bun test
      - run: bunx tsc --noEmit
      - run: bunx eslint
      - run: bun --bun next build
